<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LED Sim</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #000; overflow: hidden; }

#led {
  position: fixed;
  width: 220px; height: 220px; border-radius: 50%;
  top: calc(50% - 160px); left: calc(50% - 110px);
  background: #111;
}
#led.on {
  background: #fff;
  box-shadow: 0 0 120px 60px rgba(255,255,255,0.8);
}

#panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #0d0d0d; border-top: 1px solid #1e1e1e;
  padding: 14px 12px;
}
.rate-row { display: flex; gap: 8px; margin-bottom: 10px; }
.rbtn {
  flex: 1; padding: 11px 0; border: 1px solid #333; border-radius: 5px;
  background: #111; color: #555; font-family: monospace; font-size: 14px; cursor: pointer;
}
.rbtn.on { border-color: #fff; color: #fff; background: #1a1a1a; }
#info { color: #444; font-family: monospace; font-size: 12px; text-align: center; }
</style>
</head>
<body>

<div id="led"></div>

<div id="panel">
  <div class="rate-row">
    <button class="rbtn" data-bps="1">1 bps</button>
    <button class="rbtn" data-bps="2">2 bps</button>
    <button class="rbtn on" data-bps="5">5 bps</button>
    <button class="rbtn" data-bps="10">10 bps</button>
  </div>
  <div id="info"></div>
</div>

<script>
'use strict';
const led  = document.getElementById('led');
const info = document.getElementById('info');
let state = false, timer = null;

function start(bps) {
  clearInterval(timer);
  const half = Math.round(500 / bps);
  timer = setInterval(() => {
    state = !state;
    led.classList.toggle('on', state);
    info.textContent = bps + ' bps  |  ' + half + ' ms half-period  |  ' + (state ? 'ON' : 'off');
  }, half);
  info.textContent = bps + ' bps  |  ' + half + ' ms half-period';
}

document.querySelector('.rate-row').addEventListener('click', e => {
  const btn = e.target.closest('.rbtn');
  if (!btn) return;
  document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  start(+btn.dataset.bps);
});

start(5);
</script>
</body>
</html>
