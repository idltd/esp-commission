<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flash Reader</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #000; font-family: monospace;
  display: flex; flex-direction: column; overflow: hidden;
}

#cam-wrap { flex: 1; position: relative; min-height: 0; }
#preview  { width: 100%; height: 100%; display: block; }
#vid      { position: absolute; opacity: 0; pointer-events: none; }

#overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.88);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 14px; cursor: pointer;
}
#overlay.gone { display: none; }
#overlay .big  { color: #fff; font-size: 1.2em; }
#overlay .hint { color: #555; font-size: .82em; text-align: center; padding: 0 24px; }

#strip { flex-shrink: 0; height: 32px; width: 100%; display: block; background: #000; }

#stats {
  flex-shrink: 0;
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid #1a1a1a;
}
.st { padding: 7px 6px; border-right: 1px solid #111; }
.st:last-child { border-right: none; }
.sl { color: #2a2a2a; font-size: 9px; margin-bottom: 2px; text-transform: uppercase; }
.sv { font-size: 14px; font-weight: bold; color: #2a2a2a; }
.sv.lit { color: #3f3; }
.sv.warn { color: #f84; }

/* histogram */
#hist-section {
  flex-shrink: 0; border-top: 1px solid #1a1a1a; background: #050505;
  padding: 6px 8px 4px;
}
#hist { display: block; width: 100%; height: 64px; }
.hist-axis {
  display: flex; justify-content: space-between;
  font-size: 9px; color: #2a2a2a; margin-top: 1px;
}
#hist-peaks {
  font-size: 10px; margin-top: 4px; color: #333;
  display: flex; gap: 16px; flex-wrap: wrap;
}

/* limits */
#limits {
  flex-shrink: 0; border-top: 1px solid #1a1a1a;
  padding: 5px 8px; font-size: 10px; color: #333; line-height: 1.9;
  white-space: pre;
}

/* log */
#log-wrap {
  flex-shrink: 0; border-top: 1px solid #1a1a1a;
  padding: 5px 8px; display: flex; align-items: flex-start; gap: 8px;
}
#log { flex: 1; font-size: 10px; color: #333; max-height: 56px; overflow-y: auto; }
#btn-copy {
  flex-shrink: 0; font-size: 10px; color: #444; background: none;
  border: 1px solid #222; border-radius: 4px; padding: 2px 7px; cursor: pointer;
  font-family: monospace;
}
</style>
</head>
<body>

<div id="cam-wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="preview"></canvas>
  <div id="overlay">
    <div class="big">▶ Tap to start camera</div>
    <div class="hint">Point at the LED or screen. Green box = sample zone.</div>
  </div>
</div>

<canvas id="strip"></canvas>

<div id="stats">
  <div class="st"><div class="sl">brightness</div><div class="sv" id="sb">—</div></div>
  <div class="st"><div class="sl">cam fps</div>   <div class="sv" id="sf">—</div></div>
  <div class="st"><div class="sl">trans/s</div>   <div class="sv" id="sr">—</div></div>
  <div class="st"><div class="sl">est. bps</div>  <div class="sv" id="ss">—</div></div>
</div>

<div id="hist-section">
  <canvas id="hist"></canvas>
  <div class="hist-axis"><span>0</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500ms</span></div>
  <div id="hist-peaks">waiting for pulses…</div>
</div>

<div id="limits">—</div>

<div id="log-wrap">
  <div id="log">bps log will appear here…</div>
  <button id="btn-copy">Copy all</button>
</div>

<script>
'use strict';

const vid  = document.getElementById('vid');
const pre  = document.getElementById('preview');
const pctx = pre.getContext('2d');
const strip = document.getElementById('strip');
const sctx = strip.getContext('2d');
const histCvs = document.getElementById('hist');
const hctx = histCvs.getContext('2d');

const TH_WIN = 90;
const thBuf = [], sigBuf = [], trans = [];
const pulseWidths = [];  // measured HIGH durations (ms)

let prevBright = null, edgeStart = null;
let lastVidTime = -1;
const fpsSamples = [];
let measuredFps = 0;

// ---- stats helpers ----
function sv(id, val, cls) {
  const el = document.getElementById(id);
  el.textContent = val;
  el.className = 'sv' + (cls ? ' ' + cls : '');
}

// ---- histogram ----
const BINS = 50, BIN_MS = 10;  // 0–500ms

function drawHistogram() {
  const W = histCvs.width, H = histCvs.height;
  if (!W || !H || !pulseWidths.length) return;

  const THRESH = 250;
  const bins = new Array(BINS).fill(0);
  for (const w of pulseWidths) {
    const b = Math.min(Math.floor(w / BIN_MS), BINS - 1);
    bins[b]++;
  }
  const maxC = Math.max(1, ...bins);
  const bw = W / BINS;

  hctx.clearRect(0, 0, W, H);

  // threshold line
  const thX = (THRESH / BIN_MS) * bw;
  hctx.strokeStyle = '#444';
  hctx.lineWidth = 1;
  hctx.setLineDash([2, 3]);
  hctx.beginPath(); hctx.moveTo(thX, 0); hctx.lineTo(thX, H); hctx.stroke();
  hctx.setLineDash([]);

  // bars
  for (let i = 0; i < BINS; i++) {
    if (!bins[i]) continue;
    const h = (bins[i] / maxC) * H;
    hctx.fillStyle = (i * BIN_MS < THRESH) ? '#833' : '#383';
    hctx.fillRect(i * bw, H - h, Math.max(bw - 1, 1), h);
  }

  // find peaks
  let sP = -1, sM = 0, lP = -1, lM = 0;
  for (let i = 0; i < BINS; i++) {
    const ms = i * BIN_MS;
    if (ms < THRESH && bins[i] > sM) { sM = bins[i]; sP = ms + BIN_MS/2; }
    if (ms >= THRESH && bins[i] > lM) { lM = bins[i]; lP = ms + BIN_MS/2; }
  }

  const peaksEl = document.getElementById('hist-peaks');
  const parts = [];
  if (sP >= 0) parts.push('<span style="color:#a55">SHORT ~' + Math.round(sP) + 'ms</span>');
  if (lP >= 0) parts.push('<span style="color:#5a5">LONG ~' + Math.round(lP) + 'ms</span>');
  if (sP >= 0 && lP >= 0) {
    const sep = lP - sP;
    const ok = sep > 80;
    parts.push('<span style="color:' + (ok ? '#5a5' : '#a55') + '">sep ' + Math.round(sep) + 'ms ' + (ok ? '✓' : '⚠ too close') + '</span>');
  }
  parts.push('<span style="color:#333">n=' + pulseWidths.length + '</span>');
  peaksEl.innerHTML = parts.join('');
}

// ---- theoretical limits ----
function updateLimits(fps) {
  const fMs  = 1000 / fps;
  const minP = Math.ceil(3 * fMs / 10) * 10;
  const errMs = Math.round(fMs);
  const recS = Math.max(100, Math.ceil(4 * fMs / 10) * 10);
  const recL = Math.round(recS * 2.4 / 10) * 10;
  const recG = Math.max(60, Math.ceil(2 * fMs / 10) * 10);
  const recT = Math.round((recS + recL) / 20) * 10;
  const b0 = recS + recG, b1 = recL + recG;
  const bps = (1000 / ((b0 + b1) / 2)).toFixed(1);
  document.getElementById('limits').textContent =
    fps.toFixed(1) + ' fps  frame=' + Math.round(fMs) + 'ms  edge error ±' + errMs + 'ms\n'
    + 'min pulse ' + minP + 'ms  |  recommended: S=' + recS + ' L=' + recL + ' G=' + recG + ' T=' + recT + '  → ' + bps + ' bps';
}

// ---- log ----
const logLines = [];
let lastBps = null, stableN = 0;
function addLog(line) {
  logLines.unshift(line);
  if (logLines.length > 40) logLines.pop();
  document.getElementById('log').textContent = logLines.join('\n');
}

document.getElementById('btn-copy').addEventListener('click', () => {
  const stats = document.getElementById('limits').textContent;
  const peaks = document.getElementById('hist-peaks').innerText;
  navigator.clipboard.writeText([stats, peaks, '', ...logLines].join('\n')).catch(() => {});
});

// ---- main loop ----
function sample(ts) {
  const vw = vid.videoWidth, vh = vid.videoHeight;
  if (!vw || !vh) return;

  // camera fps from vid.currentTime
  if (vid.currentTime !== lastVidTime) {
    lastVidTime = vid.currentTime;
    fpsSamples.push(ts);
    while (fpsSamples.length && fpsSamples[0] < ts - 5000) fpsSamples.shift();
    if (fpsSamples.length >= 5)
      measuredFps = (fpsSamples.length - 1) / ((ts - fpsSamples[0]) / 1000);
  }

  // draw frame
  const cw = pre.width, ch = pre.height;
  const sc = Math.max(cw / vw, ch / vh);
  pctx.drawImage(vid, (cw - vw*sc)/2, (ch - vh*sc)/2, vw*sc, vh*sc);

  // sample centre box
  const sz = Math.max(20, Math.min(cw, ch) * 0.15 | 0);
  const bx = (cw - sz) >> 1, by = (ch - sz) >> 1;
  const px = pctx.getImageData(bx, by, sz, sz).data;
  let s = 0;
  for (let i = 0; i < px.length; i += 4)
    s += 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
  const b = s / (sz * sz);

  thBuf.push(b);
  if (thBuf.length > TH_WIN) thBuf.shift();
  const mn = Math.min(...thBuf), mx = Math.max(...thBuf);
  const thresh = (mn + mx) / 2;
  const valid  = (mx - mn) > 15;
  const bright = valid && b > thresh;

  pctx.strokeStyle = bright ? '#3f3' : (valid ? '#555' : '#333');
  pctx.lineWidth = 2;
  pctx.strokeRect(bx, by, sz, sz);

  // edge detection + pulse timing
  if (valid && prevBright !== null) {
    if (bright && !prevBright) {
      edgeStart = ts;
      trans.push(ts);
    } else if (!bright && prevBright && edgeStart !== null) {
      const w = ts - edgeStart;
      if (w > 20 && w < 700) {
        pulseWidths.push(w);
        if (pulseWidths.length > 200) pulseWidths.shift();
      }
      edgeStart = null;
    }
  }
  prevBright = valid ? bright : prevBright;
  while (trans.length && trans[0] < ts - 3000) trans.shift();

  const tps = trans.length / 3;
  const bps = tps / 2;

  // signal strip
  sigBuf.push(bright);
  if (sigBuf.length > strip.width) sigBuf.shift();
  sctx.fillStyle = '#000';
  sctx.fillRect(0, 0, strip.width, strip.height);
  for (let i = 0; i < sigBuf.length; i++) {
    sctx.fillStyle = sigBuf[i] ? '#3f3' : '#0a0a0a';
    sctx.fillRect(i, 3, 1, strip.height - 6);
  }

  sv('sb', Math.round(b), bright ? 'lit' : '');
  if (measuredFps > 0) sv('sf', measuredFps.toFixed(1), measuredFps >= 28 ? 'lit' : measuredFps >= 20 ? 'warn' : '');
  else sv('sf', '—', '');
  sv('sr', tps > 0 ? tps.toFixed(1) : '—', tps > 0 ? 'lit' : '');
  sv('ss', bps > 0.1 ? bps.toFixed(1) : '—', bps > 0.1 ? 'lit' : '');

  if (bps > 0.1) {
    if (Math.abs(bps - lastBps) < 0.3) { stableN++; } else { stableN = 0; lastBps = bps; }
    if (stableN === 10)
      addLog(new Date().toLocaleTimeString() + '  ' + bps.toFixed(1) + ' bps  fps:' + (measuredFps > 0 ? measuredFps.toFixed(0) : '?'));
  }

  drawHistogram();
  if (measuredFps > 5) updateLimits(measuredFps);
}

function tick(ts) { sample(ts); requestAnimationFrame(tick); }

function resize() {
  pre.width    = pre.offsetWidth;  pre.height   = pre.offsetHeight;
  strip.width  = strip.offsetWidth; strip.height = strip.offsetHeight;
  histCvs.width = histCvs.offsetWidth; histCvs.height = histCvs.offsetHeight;
  sigBuf.length = 0;
}
window.addEventListener('resize', resize);
resize();

document.getElementById('overlay').addEventListener('click', async function() {
  this.querySelector('.big').textContent = 'Opening camera…';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
    });
    vid.srcObject = stream;
    await new Promise(r => vid.onloadedmetadata = r);
    vid.play();
    this.classList.add('gone');
    requestAnimationFrame(tick);
  } catch(e) {
    this.querySelector('.big').textContent = '⚠ ' + e.message;
  }
});
</script>
</body>
</html>
