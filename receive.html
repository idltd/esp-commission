<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flash Reader</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #000; font-family: monospace;
  display: flex; flex-direction: column; overflow: hidden;
}

#cam-wrap { flex: 1; position: relative; min-height: 0; }
#preview  { width: 100%; height: 100%; display: block; }
#vid      { position: absolute; opacity: 0; pointer-events: none; }

#overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.85);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 14px; cursor: pointer;
}
#overlay.gone { display: none; }
#overlay .big  { color: #fff; font-size: 1.2em; }
#overlay .hint { color: #555; font-size: .82em; text-align: center; padding: 0 24px; }

/* scrolling signal strip */
#strip { flex-shrink: 0; height: 36px; width: 100%; display: block; background: #000; }

/* stats row */
#stats {
  flex-shrink: 0;
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid #1a1a1a;
}
.st { padding: 10px 8px; border-right: 1px solid #111; }
.st:last-child { border-right: none; }
.sl { color: #333; font-size: 10px; margin-bottom: 3px; text-transform: uppercase; }
.sv { font-size: 16px; font-weight: bold; color: #2a2a2a; }
.sv.lit { color: #3f3; }

/* bps history table */
#log {
  flex-shrink: 0; border-top: 1px solid #1a1a1a;
  padding: 8px 12px; max-height: 100px; overflow-y: auto;
}
#log-inner { color: #444; font-size: 11px; line-height: 1.8; }
</style>
</head>
<body>

<div id="cam-wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="preview"></canvas>
  <div id="overlay">
    <div class="big">▶ Tap to start camera</div>
    <div class="hint">Point at LED. Green box = sample zone.</div>
  </div>
</div>

<canvas id="strip"></canvas>

<div id="stats">
  <div class="st"><div class="sl">brightness</div><div class="sv" id="sb">—</div></div>
  <div class="st"><div class="sl">threshold</div> <div class="sv" id="st">—</div></div>
  <div class="st"><div class="sl">trans/s</div>   <div class="sv" id="sr">—</div></div>
  <div class="st"><div class="sl">est. bps</div>  <div class="sv" id="ss">—</div></div>
</div>

<div id="log"><div id="log-inner">bps log will appear here…</div></div>

<script>
'use strict';

const vid    = document.getElementById('vid');
const pre    = document.getElementById('preview');
const pctx   = pre.getContext('2d');
const strip  = document.getElementById('strip');
const sctx   = strip.getContext('2d');

// rolling min/max for adaptive threshold (~3 s at 30 fps)
const thBuf = [];
const TH_WIN = 90;

// scrolling signal strip
const sigBuf = [];

// transition timestamps (last 3 s)
let prevBright = null;
const trans = [];

// bps log
const bpsHistory = [];
let lastLoggedBps = null;
let stableCount = 0;

function sv(id, val, active) {
  const el = document.getElementById(id);
  el.textContent = val;
  el.className = 'sv' + (active ? ' lit' : '');
}

function logBps(bps) {
  if (Math.abs(bps - lastLoggedBps) < 0.3) {
    stableCount++;
  } else {
    stableCount = 0;
    lastLoggedBps = bps;
  }
  if (stableCount === 10) {  // stable for ~1 s → log it
    const t = new Date().toLocaleTimeString();
    bpsHistory.unshift(t + '  →  ' + bps.toFixed(1) + ' bps');
    if (bpsHistory.length > 20) bpsHistory.pop();
    document.getElementById('log-inner').textContent = bpsHistory.join('\n');
  }
}

function sample(ts) {
  const vw = vid.videoWidth, vh = vid.videoHeight;
  if (!vw || !vh) return;

  // draw video to canvas
  const cw = pre.width, ch = pre.height;
  const sc = Math.max(cw / vw, ch / vh);
  pctx.drawImage(vid, (cw - vw*sc)/2, (ch - vh*sc)/2, vw*sc, vh*sc);

  // sample centre box (15% of smallest dimension)
  const sz = Math.max(20, Math.min(cw, ch) * 0.15 | 0);
  const bx = (cw - sz) >> 1, by = (ch - sz) >> 1;
  const px = pctx.getImageData(bx, by, sz, sz).data;
  let s = 0;
  for (let i = 0; i < px.length; i += 4)
    s += 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
  const b = s / (sz * sz);

  // adaptive threshold
  thBuf.push(b);
  if (thBuf.length > TH_WIN) thBuf.shift();
  const mn = Math.min(...thBuf), mx = Math.max(...thBuf);
  const thresh = (mn + mx) / 2;
  const valid  = (mx - mn) > 15;
  const bright = valid && b > thresh;

  // draw sample box
  pctx.strokeStyle = bright ? '#3f3' : '#f44';
  pctx.lineWidth   = 2;
  pctx.strokeRect(bx, by, sz, sz);

  // transitions
  if (valid && prevBright !== null && bright !== prevBright)
    trans.push(ts);
  prevBright = bright;
  while (trans.length && trans[0] < ts - 3000) trans.shift();

  const tps = trans.length / 3;
  const bps = tps / 2;

  // signal strip
  sigBuf.push(bright);
  if (sigBuf.length > strip.width) sigBuf.shift();
  sctx.fillStyle = '#000';
  sctx.fillRect(0, 0, strip.width, strip.height);
  for (let i = 0; i < sigBuf.length; i++) {
    sctx.fillStyle = sigBuf[i] ? '#3f3' : '#111';
    sctx.fillRect(i, 4, 1, strip.height - 8);
  }

  sv('sb', Math.round(b),                  bright);
  sv('st', valid ? Math.round(thresh) : '—', valid);
  sv('sr', tps > 0 ? tps.toFixed(1) : '—',  tps > 0);
  sv('ss', bps > 0.1 ? bps.toFixed(1) : '—', bps > 0.1);

  if (bps > 0.1) logBps(bps);
}

function tick(ts) { sample(ts); requestAnimationFrame(tick); }

function resize() {
  pre.width    = pre.offsetWidth;
  pre.height   = pre.offsetHeight;
  strip.width  = strip.offsetWidth;
  strip.height = strip.offsetHeight;
  sigBuf.length = 0;
}
window.addEventListener('resize', resize);
resize();

document.getElementById('overlay').addEventListener('click', async function () {
  this.querySelector('.big').textContent = 'Opening camera…';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
    });
    vid.srcObject = stream;
    await new Promise(r => vid.onloadedmetadata = r);
    vid.play();
    this.classList.add('gone');
    requestAnimationFrame(tick);
  } catch (e) {
    this.querySelector('.big').textContent = '⚠ ' + e.message;
  }
});
</script>
</body>
</html>
